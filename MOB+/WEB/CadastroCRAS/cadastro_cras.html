<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de CRAS</title>
    <link rel="stylesheet" href="cadastro_cras.css">
</head>
<body>
    <div class="container">
        <div class="form-image">
            <img src="fade.png" alt="Fade Image">
        </div>
        <div class="form-content">
            <h1 class="form-title">Cadastro de CRAS</h1>
            <div>
                <input type="text" id="nome" name="nome" placeholder="nome">
                <input type="text" id="cnpj" name="cnpj" placeholder="CNPJ">
                <input type="text" id="cidade" name="cidade" placeholder="cidade">
                <input type="text" id="bairro" name="bairro" placeholder="bairro">
                <input type="text" id="contato" name="contato" placeholder="contato">
                <select id="tipo" name="tipo" onclick="removePlaceholderOption()">
                    <option value="" disabled selected>tipo de CRAS</option>
                    <option value="paif">Serviço de Proteção e Atendimento Integral à Família (PAIF)</option>
                    <option value="scfv">Serviço de convivência e fortalecimento de vínculos (SCFV)</option>
                    <option value="idosos">Serviço de proteção social básica no domicílio para pessoas com deficiência e idosos</option>
                </select>
                <div class="btn-container">
                    <button onclick="window.location.href='cadastrocras_feito.html'" class="btn-cadastrar">Cadastrar CRAS</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        function removePlaceholderOption() {
            const selectElement = document.getElementById('tipo');
            const placeholderOption = selectElement.querySelector('option[value=""]');
            if (placeholderOption) {
                placeholderOption.remove();
            }
            selectElement.onclick = null; // Remove o evento de clique para evitar múltiplas execuções
        }
    </script>
</body>
</html>
